version: '3.8'

services:
  app:
    build: .
    container_name: mini-commerce-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: mini-commerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # Optional: PostgreSQL for future integration
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: mini-commerce-db
  #   environment:
  #     - POSTGRES_USER=minicommerce
  #     - POSTGRES_PASSWORD=secure_password
  #     - POSTGRES_DB=minicommerce
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #
  # volumes:
  #   postgres_data:

volumes:
  app_data:
  app_logs:
