<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Commerce - Product Catalog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>🛍️ Mini Commerce</h1>
        <p class="subtitle">Simple Product Catalog Management</p>
      </div>
    </header>

    <main>
      <!-- Add/Edit Product Form -->
      <section class="form-section">
        <div class="form-container">
          <h2>Add New Product</h2>
          <form id="productForm">
            <div class="form-group">
              <label for="productName">Product Name *</label>
              <input type="text" id="productName" required placeholder="Enter product name">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="productPrice">Price ($) *</label>
                <input type="number" id="productPrice" required placeholder="0.00" min="0" step="0.01">
              </div>
              
              <div class="form-group">
                <label for="productStock">Stock *</label>
                <input type="number" id="productStock" required placeholder="0" min="0">
              </div>
            </div>
            
            <div class="form-group">
              <label for="productDescription">Description</label>
              <textarea id="productDescription" placeholder="Enter product description" rows="3"></textarea>
            </div>
            
            <div class="form-buttons">
              <button type="submit" id="submitBtn">Add Product</button>
              <button type="reset" class="btn-secondary">Clear</button>
              <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Search and Filter -->
      <section class="search-section">
        <input type="text" id="searchInput" class="search-box" placeholder="Search products by name...">
      </section>

      <!-- Products List -->
      <section class="products-section">
        <h2>Products</h2>
        <div id="productsContainer" class="products-grid">
          <div class="loading">Loading products...</div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 Mini Commerce. All rights reserved.</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
